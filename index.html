
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fractal Interfaces</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 32px;
    background: #0f1115;
    color: white;
    font-family: Inter, system-ui, sans-serif;
  }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 32px;
    min-height: 100vh;
  }

  .controls {
    position: sticky;
    top: 32px;
    align-self: start;
    padding: 24px;
    border-radius: 24px;
    background: #171a21;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .controls h1 {
    margin-top: 0;
    font-size: 20px;
  }

  .field {
    margin-bottom: 24px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    opacity: 0.7;
  }

  input {
    width: 100%;
  }

  .preview {
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);

    border-radius: calc(var(--cur) * 1px);

    padding:
      calc(max(1, var(--cur) - var(--prev)) * 1px);

    transition:
      border-radius 200ms ease,
      padding 200ms ease;
  }

  .fib-root {
    --a-cur: 8;
    --a-prev: 5;
  }

  .fib-a {
    --cur: var(--a-cur);
    --prev: var(--a-prev);

    --b-cur: var(--a-prev);
    --b-prev: max(1, calc(var(--a-cur) - var(--a-prev)));
  }

  .fib-b {
    --cur: var(--b-cur);
    --prev: var(--b-prev);

    --a-cur: var(--b-prev);
    --a-prev: max(1, calc(var(--b-cur) - var(--b-prev)));
  }

  .card-content {
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.8;
    font-size: 12px;
    letter-spacing: 0.04em;
  }

  .metrics {
    margin-top: 24px;
    font-size: 13px;
    line-height: 1.8;
    opacity: 0.75;
  }

  .hidden {
    display: none;
  }

  code {
    color: #9ad1ff;
  }
</style>
</head>
<body>

<div class="layout">

  <aside class="controls">
    <h1>Fractal Interfaces</h1>

    <div class="field">
      <label>Start Fibonacci Number</label>
      <input id="start" type="range" min="2" max="144" value="21" />
      <div id="start-value">21</div>
    </div>

    <div class="field">
      <label>Levels</label>
      <input id="levels" type="range" min="2" max="8" value="5" />
      <div id="levels-value">5</div>
    </div>

    <div class="field hidden">
      <label>Padding Multiplier</label>
      <input id="scale" type="range" min="1" max="12" value="1" />
      <div id="scale-value">1</div>
    </div>

    <div class="metrics" id="metrics"></div>
  </aside>

  <main class="preview" id="preview"></main>

</div>

<script>
  const startInput = document.getElementById('start');
  const levelsInput = document.getElementById('levels');
  const scaleInput = document.getElementById('scale');

  const startValue = document.getElementById('start-value');
  const levelsValue = document.getElementById('levels-value');
  const scaleValue = document.getElementById('scale-value');

  const preview = document.getElementById('preview');
  const metrics = document.getElementById('metrics');

  function fibonacciUntil(max) {
    const fib = [1, 1];

    while (fib[fib.length - 1] < max) {
      fib.push(
        fib[fib.length - 1] +
        fib[fib.length - 2]
      );
    }

    return fib;
  }

  function nearestFib(target) {
    const fib = fibonacciUntil(target * 2);

    return fib.reduce((prev, curr) =>
      Math.abs(curr - target) <
      Math.abs(prev - target)
        ? curr
        : prev
    );
  }

  function buildPairs(start, levels) {
    const fib = fibonacciUntil(start * 2);

    const index = fib.indexOf(start);

    const pairs = [];

    let cur = fib[index];
    let prev = fib[index - 1] || 1;

    for (let i = 0; i < levels; i++) {
      pairs.push([cur, prev]);

      const next = Math.max(1, cur - prev);

      cur = prev;
      prev = next;
    }

    return pairs;
  }

  function buildNested(levels, pairs) {
    let html = '';

    for (let i = 0; i < levels; i++) {
      const klass = i % 2 === 0
        ? 'fib-a'
        : 'fib-b';

      const [cur, prev] = pairs[i];

      html += `
        <div class="card ${klass}">
          <div class="card-content">
            br ${cur} / p ${Math.max(1, cur - prev)}
          </div>
      `;
    }

    html += '</div>'.repeat(levels);

    return html;
  }

  function render() {
    const rawStart = parseInt(startInput.value);
    const levels = parseInt(levelsInput.value);
    const scale = parseInt(scaleInput.value);

    const start = nearestFib(rawStart);

    const pairs = buildPairs(start, levels);

    startValue.textContent = start;
    levelsValue.textContent = levels;
    scaleValue.textContent = scale;

    const rootCur = pairs[0][0];
    const rootPrev = pairs[0][1];

    preview.innerHTML = `
      <div
        class="fib-root fib-a"
        style="
          --a-cur:${rootCur};
          --a-prev:${rootPrev};
        "
      >
        ${buildNested(levels, pairs)}
      </div>
    `;

    document.documentElement.style.setProperty(
      '--scale',
      scale
    );

    document.querySelectorAll('.card').forEach(el => {
      const cur =
        getComputedStyle(el)
        .getPropertyValue('--cur');

      const prev =
        getComputedStyle(el)
        .getPropertyValue('--prev');

      const radius = parseFloat(cur);
      const padding =
        Math.max(1, radius - parseFloat(prev));

      el.style.padding =
        `${padding * scale}px`;
    });

    metrics.innerHTML = pairs.map((pair, i) => {
      const radius = pair[0];
      const padding =
        Math.max(1, pair[0] - pair[1]);

      return `
        <div>
          <code>depth-${i + 1}</code>
          →
          br ${radius}
          /
          p ${padding}
        </div>
      `;
    }).join('');
  }

  startInput.addEventListener('input', render);
  levelsInput.addEventListener('input', render);
  scaleInput.addEventListener('input', render);

  render();
</script>

</body>
</html>
